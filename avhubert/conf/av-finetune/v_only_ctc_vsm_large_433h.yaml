# @package _group_

common:
  fp16: true
  log_format: json
  log_interval: 200
  tensorboard_logdir: tblog
  seed: 1337
  user_dir: ???

checkpoint:
  save_interval: 2
  keep_interval_updates: 1
  no_epoch_checkpoints: true
  best_checkpoint_metric: uer
  maximize_best_checkpoint_metric: false

distributed_training:
  ddp_backend: c10d
  find_unused_parameters: true
  distributed_world_size: 8
  distributed_port: 29671
  nprocs_per_node: 8

task:
  _name: viseme_av_hubert_pretraining
  is_s2s: false
  fine_tuning: true
  data: /data/DB/lrs3/433h_data
  label_dir: /data/DB/lrs3/433h_data
  labels: ["vsm"]
  normalize: true  # must be consistent with pre-training
  single_target: true
  modalities: ["video"]
  stack_order_audio: 4
  max_sample_size: 500
  image_aug: true
  pad_audio: false
  random_crop: false

dataset:
  num_workers: 6
  max_tokens: 1000
  validate_after_updates: 0
  validate_interval: 2
  train_subset: train
  valid_subset: valid

criterion:
  _name: ctc
  zero_infinity: true
  sentence_avg: true
  post_process: letter

optimization:
  max_update: 60000
  lr: [0.001]
  sentence_avg: true
  update_freq: [1]

optimizer:
  _name: adam
  adam_betas: (0.9,0.98)
  adam_eps: 1e-08

lr_scheduler:
  _name: tri_stage
  warmup_steps: 20000
  hold_steps: 0
  decay_steps: 40000
  final_lr_scale: 0.05

model:
  _name: av_hubert_ctc
  w2v_path: /home/dan/projects/visg_avhubert/large_vox_iter5.pt
  apply_mask: false
  mask_selection: static
  mask_length: 10
  mask_other: 0
  mask_prob: 0.75
  mask_channel_selection: static
  mask_channel_length: 64
  mask_channel_other: 0
  mask_channel_prob: 0.5
  layerdrop: 0.1
  dropout: 0.0
  activation_dropout: 0.1
  attention_dropout: 0.0
  feature_grad_mult: 1.0
  freeze_finetune_updates: 40000

hydra:
  job:
    config:
      override_dirname:
        kv_sep: '-'
        item_sep: '__'
        exclude_keys:
          - run
          - task.data
          - task.label_dir
          - model.w2v_path
          - dataset.train_subset
          - dataset.valid_subset
  run:
    dir: /home/dan/projects/visg_avhubert/v_only_ctc_vsm
  sweep:
    dir: /home/dan/projects/visg_avhubert/v_only_ctc_vsm
    subdir: ${hydra.job.config_name}__${hydra.job.override_dirname}
